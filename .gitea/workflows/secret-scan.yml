name: Secret scan

# Direct molecule-ci gate. Cross-repository workflow_call is intentionally not
# exposed: Gitea 1.26.4 can report such consumers green with zero steps. Other
# repositories install templates/ci-secret-scan.yml and execute the canonical
# scripts/scan_diff_secrets.py in their own job.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  scan:
    name: Scan diff for credential-shaped strings
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 2

      - name: Scan exact changed content with fail-closed tree fallback
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          set -o pipefail
          if [ "${{ github.event_name }}" = pull_request ]; then
            BASE=$PR_BASE_SHA
            HEAD=$PR_HEAD_SHA
          else
            BASE=$PUSH_BEFORE
            HEAD=$PUSH_AFTER
          fi
          python3 scripts/scan_diff_secrets.py \
            --repo-root . --base "$BASE" --head "$HEAD" \
            | tee /tmp/secret-scan.log

      - name: Assert scanner execution sentinel
        if: always()
        run: |
          grep -qxF 'secret-scan:sentinel:executed' /tmp/secret-scan.log || {
            echo '::error::secret scanner execution sentinel missing'
            exit 1
          }
