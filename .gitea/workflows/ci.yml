name: CI

# CI gate for molecule-ci itself.
# Validates YAML syntax of all workflow files, lints the validator scripts,
# and RUNS the validator pytest suites in scripts/test_*.py.
# The validators themselves still aren't invoked against a real template here
# (that needs plugin.yaml/Dockerfile/config.yaml this repo doesn't carry —
# the 8 template repos are the live integration test), but their unit suites
# pin the drift contract and now actually execute on every PR/push.

on:
  pull_request:
  push:
    branches: [main]
  # No `schedule:` cron (no-nightly/no-cron CI policy). CI runs per-PR and on
  # push:main; the daily badge-keeper cron is not a gate and is removed.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  yaml-lint:
    name: Workflow YAML lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check all workflow YAMLs parse correctly
        run: |
          python3 - << 'PYEOF'
          import sys, os
          from pathlib import Path
          import yaml

          errors = 0
          for subdir in ('.gitea/workflows', '.github/workflows'):
              for path in Path(subdir).glob('*.yml'):
                  try:
                      with open(path, 'rb') as f:
                          yaml.safe_load(f)
                      print(f"  OK  {path}")
                  except yaml.YAMLError as e:
                      print(f"  FAIL {path}: {e}")
                      errors += 1
          if errors > 0:
              print(f"::error::{errors} workflow file(s) have invalid YAML")
              sys.exit(1)
          print("All workflow YAMLs are syntactically valid.")
          PYEOF

  python-lint:
    name: Python script lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax check (compileall)
        run: |
          errors=0
          for f in scripts/*.py; do
            [ -f "$f" ] || continue
            if python3 -m py_compile "$f" 2>&1; then
              echo "  OK  $f"
            else
              echo "  FAIL $f"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors Python file(s) failed to compile"
            exit 1
          fi

  pytest:
    name: Validator pytest suites
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - name: Install test deps
        run: pip install --break-system-packages -r scripts/requirements.txt -q
      - name: Run validator test suites
        # The scripts/test_*.py suites pin the drift contract for the
        # validate-*/migrate-template validators and runners-restart-safe.sh.
        # They were only py_compile-checked before this job existed, so ~60
        # test functions never executed. Run them for real here.
        #
        # The adapter runtime-load tests self-skip when
        # molecules-workspace-runtime isn't installed (not in
        # scripts/requirements.txt); the git-clone drift tests run because
        # ubuntu-latest ships git. -ra surfaces every skip reason in the log
        # so a silently-skipped suite can't masquerade as a pass.
        run: python3 -m pytest scripts/ -v -ra

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - run: pip install --break-system-packages pyyaml -q
      - run: python3 scripts/check-secrets.py
