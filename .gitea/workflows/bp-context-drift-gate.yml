name: bp-context-drift-gate

# BP-context drift gate (ADVISORY) — ported BP⊆emitted asserter.
#
# Asserts that every context required by this repo's branch-protection
# (branch_protections/main.status_check_contexts) is EMITTED by some
# workflow in .gitea/workflows/*.yml. A required context with no emitter
# is perma-pending — Gitea treats absent-as-`pending`, NOT
# absent-as-`skipped`-as-`success` — so the merge endpoint returns HTTP
# 405 "try again later" FOREVER. This is the perma-block root cause
# class (feedback_phantom_required_check_after_gitea_migration).
#
# ADVISORY for now: this job is `continue-on-error: true`, so it NEVER
# blocks a merge yet. The SCRIPT it runs
# (.molecule-ci/scripts/lint_bp_context_emit_match.py, MODE=assert) is
# FAIL-CLOSED: it exits nonzero on auth failure / missing token / orphan
# context, so when this job is later promoted to a required hard gate
# (after a clean advisory window) it is already correct.
#
# To actually verify, the job needs a DRIFT_BOT_TOKEN — read-only
# repo-admin, used only for the branch_protections GET. It is sourced
# from the Infisical SSOT (/shared/drift-bot, prod) via the CI machine
# identity (INFISICAL_CI_*). If that fetch fails, the fetch step exits
# nonzero and the script fails-closed (advisory, so it does not block)
# and surfaces the auth error loudly in the job log.
#
# Modeled on molecule-controlplane's cf-tunnel-drift-gate job
# (cross-repo drift gate) for conventions: pinned action SHAs,
# concurrency cancel-in-progress, manual workflow_dispatch.
#
# Follow-up (separate PR): canonical-name standardization (CI/validate)
# across the template repos so no BP requires a context name no
# workflow emits.

on:
  pull_request:
    paths:
      - ".gitea/workflows/**"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bp-context-drift-gate:
    name: BP-context drift gate (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # ADVISORY: never block a merge while this gate beds in. The script
    # itself is fail-closed (nonzero on auth error / orphan); this flag
    # only governs whether THIS job's red blocks the PR. Flip to false
    # (and add the context to BP) to promote to a required hard gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install PyYAML==6.0.2 -q
      # KMS migration (RFC: Gitea-Actions-secrets -> Infisical/KMS): source
      # DRIFT_BOT_TOKEN from the Infisical SSOT via the CI machine identity
      # instead of the duplicated Gitea Actions secret. This is the last stray
      # consumer of the Gitea DRIFT_BOT_TOKEN secret; once this lands the Gitea
      # secret can be retired (validate-before-delete).
      #
      # act masked-secret-substitution fix (root cause a542ba98):
      #   The token is fetched AND the asserter is run IN THIS SAME step, and
      #   the token is handed to the script as a DIRECT process env var
      #   (`GITEA_TOKEN="$DRIFT_BOT_TOKEN" python3 ...`). It is NEVER written to
      #   $GITHUB_ENV and NEVER re-read through a `${{ env.* }}` expression.
      #
      #   The previous shape fetched the token in one step, `::add-mask::`-ed
      #   it, wrote it to $GITHUB_ENV, and a SECOND step re-read it via
      #   `GITEA_TOKEN: ${{ env.DRIFT_BOT_TOKEN }}`. Under `act` (the runner) a
      #   masked value read back through a `${{ }}` expression is substituted
      #   with the literal mask `***`, so the script sent
      #   `Authorization: token ***` -> Gitea 401/403 reqToken -> the gate went
      #   red even though the token and the mc-drift-bot repo-admin grant were
      #   both valid. Keeping the token in-process (shell var -> direct env on
      #   the python invocation) never evaluates it through `${{ }}`, so it
      #   stays intact. `::add-mask::` is retained purely for log hygiene -- it
      #   was the $GITHUB_ENV round-trip, not the mask itself, that corrupted
      #   the value. Same "flaky == a deterministic bug" class as our other
      #   act-substitution fixes.
      - name: Assert BP-required contexts are all emitted (token fetched in-step)
        id: bp_drift_assert
        # TRUSTED-REF GATE: only the Infisical CI-identity login runs on trusted
        # refs so an untrusted fork PR cannot trigger it and harvest
        # INFISICAL_CI_*. workflow_dispatch is collaborator-only on Gitea; a
        # pull_request is allowed only when it is NOT from a fork (same-repo PR
        # head). This workflow has a pull_request trigger, so the guard matters.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
          # GITEA_TOKEN is intentionally NOT set here: it is passed as a direct
          # process env var on the python invocation below so the masked secret
          # never round-trips through $GITHUB_ENV / a `${{ }}` expression.
          GITEA_HOST: git.moleculesai.app
          REPO: ${{ github.repository }}
          BRANCH: main
          WORKFLOWS_DIR: .gitea/workflows
          MODE: assert
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); v=d.get("accessToken"); sys.stdout.write(v if isinstance(v,str) and v else "")')
          if [ -z "$TOK" ]; then
            echo "Infisical universal-auth login returned no accessToken -- failing closed" >&2
            exit 1
          fi
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=prod&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); v=(d.get("secret") or {}).get("secretValue"); sys.stdout.write(v if isinstance(v,str) and v else "")'
          }
          DRIFT_BOT_TOKEN=$(read_secret DRIFT_BOT_TOKEN %2Fshared%2Fdrift-bot)
          echo "::add-mask::$DRIFT_BOT_TOKEN"
          if [ -z "$DRIFT_BOT_TOKEN" ]; then
            echo "Infisical returned empty for DRIFT_BOT_TOKEN at /shared/drift-bot (prod) -- failing closed" >&2
            exit 1
          fi
          echo "DRIFT_BOT_TOKEN loaded from Infisical (len=${#DRIFT_BOT_TOKEN})"
          # Hand the token to the asserter as a DIRECT process env var. This is
          # the fix: it is never written to $GITHUB_ENV and never re-read via a
          # `${{ env.* }}` expression, so `act` cannot substitute it with `***`.
          GITEA_TOKEN="$DRIFT_BOT_TOKEN" python3 .molecule-ci/scripts/lint_bp_context_emit_match.py
