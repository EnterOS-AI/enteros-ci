# schema-sync — keep the vendored marketplace-artifact JSON-Schemas in
# schemas/ byte-identical to their molecule-ai-sdk (contracts/) SSOT originals.
#
# The validate-plugin / validate-workspace-template / validate-org-template
# scripts now validate real artifact manifests against schemas/*.schema.json
# (vendored from molecule-ai-sdk contracts/). This gate re-fetches each schema
# from the immutable commit in schemas/SDK_SOURCE_COMMIT, requires that source
# snapshot to match current SDK main, and diffs it against the vendored copy.
# Drift, source bytes not yet on main, invalid pins, and incomplete fetches all
# fail closed.
# See schemas/PROVENANCE.md.

name: Schema Sync

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  schema-sync:
    name: Vendored schemas in sync with molecule-ai-sdk
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Check vendored schemas against immutable SDK contracts
        run: bash scripts/check-schemas-in-sync.sh
