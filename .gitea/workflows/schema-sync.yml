# schema-sync — keep the vendored marketplace-artifact JSON-Schemas in
# schemas/ byte-identical to their molecule-ai-sdk (contracts/) SSOT originals.
#
# The validate-plugin / validate-workspace-template / validate-org-template
# scripts now validate real artifact manifests against schemas/*.schema.json
# (vendored from molecule-ai-sdk contracts/). This gate clones SDK main once,
# resolves it to an exact commit, and diffs every vendored copy against that
# coherent snapshot. Mirrors molecule-ai-workspace-runtime#196's vendored-schema
# drift gate. It fails
# closed when that source snapshot cannot be verified. See schemas/PROVENANCE.md.

name: Schema Sync

on:
  pull_request:
    paths:
      - "schemas/**"
      - "scripts/check-schemas-in-sync.sh"
      - ".gitea/workflows/schema-sync.yml"
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  schema-sync:
    name: Vendored schemas in sync with molecule-ai-sdk
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check vendored schemas against one molecule-ai-sdk main snapshot
        run: bash scripts/check-schemas-in-sync.sh
