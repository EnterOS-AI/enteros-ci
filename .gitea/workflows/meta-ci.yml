# meta-ci — reusable capability→bundle router gate (task internal#57, RFC: org CI-enforcement).
#
# Reads the caller repo's `repo-meta.yaml`, DERIVES the CI capability-bundle set
# (scripts/meta-ci.py), runs the wired bundle runners, and emits ONE aggregate
# commit-status context (default `meta-ci / required`) on the head commit. The
# matrix over bundles runs IN-PROCESS inside meta-ci.py (a single job), so exactly
# ONE context is posted — not one-per-matrix-leg, and not a cross-repo workflow_call.
#
# CROSS-REPO INVOCATION CAVEAT (Gitea Actions 1.26.4):
# A remote `workflow_call` can be recorded green WITHOUT executing referenced steps
# (internal#1000: a consumer job completed green with steps=[]). This reusable is
# therefore NOT yet a trustworthy remote gate. Two mitigations:
#   * consumers adopt via the INLINE template `templates/ci-meta.yml` (anon-clones
#     molecule-ci and runs the canonical script directly — the #1000-blessed pattern), and
#   * meta-ci.py prints a `meta-ci:sentinel:executed` line so a hollow no-op run can be
#     detected in the log (and a Phase-4 gate can assert the sentinel was emitted).
# The reusable is retained for molecule-ci's own selftest (same-repo `uses:` DOES run)
# and for the future once cross-repo execution is proven on this deployment.
#
# ADVISORY vs ENFORCING:
#   advisory=true  (default) — run + report to the log; DO NOT post a commit status and
#                  DO NOT fail the job. Nothing this job does can block a merge. This is
#                  the Phase-1 posture (R1 proved that on `["*"]` BP any non-green context
#                  blocks, so an advisory gate must not post a real-state named context).
#   advisory=false (Phase 3+) — POST the aggregate `context_name` with the REAL state and
#                  fail the job on red. On a `["*"]` (or explicitly-listed) BP this then
#                  enforces. Flipping this one boolean is the Phase-3 promotion.

name: meta-ci

on:
  workflow_call:
    inputs:
      context_name:
        description: "Commit-status context to post on the head commit (enforcing mode only)."
        required: false
        type: string
        default: "meta-ci / required"
      repo_root:
        description: "Path within the caller checkout whose repo-meta.yaml to route."
        required: false
        type: string
        default: "."
      advisory:
        description: "true = report-only, never post a status or block; false = enforce."
        required: false
        type: boolean
        default: true

permissions:
  contents: write   # Gitea: the ephemeral token needs repo write to POST a commit status
  statuses: write   # (statuses:write alone is a no-op on this Gitea); keeps it GitHub-portable.

jobs:
  required:
    name: required
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
      # Locate the canonical router. When the caller IS molecule-ci (the self-test),
      # the checkout already carries scripts/meta-ci.py + schemas/ — use it so the
      # self-test exercises THIS ref's router, not whatever is on main. Otherwise
      # anon-clone the molecule-ci SSOT (schemas/ is a sibling of scripts/ there, so
      # schema validation stays intact). Direct git-clone (not actions/checkout) for
      # the cross-repo fetch — see validate-plugin.yml for the Gitea 1.26.4 auth reason.
      - name: Locate canonical meta-ci router
        id: locate
        run: |
          if [ -f scripts/meta-ci.py ]; then
            echo "router=scripts/meta-ci.py" >> "$GITHUB_OUTPUT"
            echo "using local checkout's scripts/meta-ci.py (caller is molecule-ci)"
          else
            git clone --depth 1 https://git.moleculesai.app/molecule-ai/molecule-ci.git .molecule-ci-canonical
            echo "router=.molecule-ci-canonical/scripts/meta-ci.py" >> "$GITHUB_OUTPUT"
            echo "cloned molecule-ci SSOT for the router"
          fi
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - run: pip install --break-system-packages pyyaml jsonschema -q
      - name: Run meta-ci router
        id: meta
        continue-on-error: true
        run: python3 "${{ steps.locate.outputs.router }}" --repo-root "${{ inputs.repo_root }}"

      - name: Post aggregate commit status (enforcing mode only)
        if: ${{ inputs.advisory == false }}
        env:
          GH_TOKEN: ${{ github.token }}
          CTX: ${{ inputs.context_name }}
          OUTCOME: ${{ steps.meta.outcome }}
        run: |
          API="${GITHUB_API_URL:-$GITHUB_SERVER_URL/api/v1}"
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          if [ "$OUTCOME" = "success" ]; then STATE=success; DESC="meta-ci bundles green"; else STATE=failure; DESC="meta-ci bundles failed"; fi
          BODY=$(printf '{"state":"%s","context":"%s","description":"%s","target_url":"%s"}' \
            "$STATE" "$CTX" "$DESC" \
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID")
          code=$(curl -s -o /tmp/meta_status.json -w '%{http_code}' -X POST \
            -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" \
            "$API/repos/$GITHUB_REPOSITORY/statuses/$SHA" -d "$BODY")
          echo "commit-status POST ($CTX=$STATE) -> HTTP $code"; cat /tmp/meta_status.json 2>/dev/null || true; echo
          if [ "$code" -ge 300 ]; then echo "::warning::could not post '$CTX' (HTTP $code); job conclusion still enforces the result"; fi

      - name: Enforce result (enforcing mode only)
        if: ${{ inputs.advisory == false }}
        run: |
          if [ "${{ steps.meta.outcome }}" != "success" ]; then
            echo "::error::meta-ci failed — see the 'Run meta-ci router' step log"; exit 1
          fi
          echo "meta-ci passed"

      - name: Advisory note (report-only mode)
        if: ${{ inputs.advisory != false }}
        run: |
          echo "meta-ci ran in ADVISORY mode (outcome=${{ steps.meta.outcome }}). No status posted; this job cannot block a merge."
          echo "Promote to enforcing by calling with advisory: false (Phase 3)."
