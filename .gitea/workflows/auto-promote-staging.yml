name: Auto-promote staging → main

# RETIRED/NONFUNCTIONAL WRAPPER — DO NOT RELY ON THIS AS A PROMOTION PATH.
# The job below references an absent `.github/workflows/auto-promote-branch.yml`;
# changing it to the `.gitea` definition could activate branch promotion and is
# intentionally deferred to the reviewed policy work in internal #1000. The
# current Gitea deployment also records remote workflow_call consumers green
# without executing their steps. No repository should copy this wrapper.

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: write          # push the fast-forward to main
  statuses: read           # read commit status checks
  administration: read     # read branch protection (required by the
                           # reusable workflow — see its header for why)

jobs:
  promote:
    # Intentionally left pointing at the absent historical path so this docs
    # correction cannot silently enable staging-to-main promotion.
    uses: ./.github/workflows/auto-promote-branch.yml
    with:
      from-branch: staging
      to-branch: main
