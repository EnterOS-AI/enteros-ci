name: minimal-validate-selftest

# Direct, read-only proof that the canonical baseline validator actually ran.
# No workflow_call is used because Gitea 1.26.4 can report cross-repository
# consumers green with zero steps.

on:
  pull_request:
    paths:
      - "scripts/minimal_validate.py"
      - "scripts/test_minimal_validate.py"
      - ".gitea/workflows/minimal-validate-selftest.yml"
  push:
    branches: [main]
    paths:
      - "scripts/minimal_validate.py"
      - "scripts/test_minimal_validate.py"
      - ".gitea/workflows/minimal-validate-selftest.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  minimal-validate:
    name: minimal-validate
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: pip install --break-system-packages pyyaml -q
      - name: Execute canonical validator
        run: |
          set -o pipefail
          python3 scripts/minimal_validate.py "$GITHUB_WORKSPACE" \
            | tee /tmp/minimal-validate.log
      - name: Assert execution sentinel
        run: grep -qxF 'minimal-validate:sentinel:executed' /tmp/minimal-validate.log
