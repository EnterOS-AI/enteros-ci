# External serialized merge queue used by this repository.
#
# Same as molecule-core/.gitea/workflows/gitea-merge-queue.yml but scoped
# to molecule-ci's needs:
#   - the manual workflow fallback requires CI / Workflow YAML lint
#   - the scoped conductor supplies its merge actor independently in-process
#
# A manual `workflow_dispatch` uses the repo AUTO_SYNC_TOKEN secret. The scoped
# conductor does not execute this Actions job and supplies its own token.
#
# Queue contract:
#   - add label `merge-queue` to an open same-repo PR
#   - bot updates stale PR heads with current main, then waits for CI
#   - bot merges only when current main is green and required PR contexts pass
#   - add `merge-queue-hold` to pause a queued PR without removing it

name: gitea-merge-queue

on:
  # `schedule:` was removed to avoid fleet-wide no-op runner jobs. Presence of
  # this workflow is the opt-in marker consumed by the scoped conductor source
  # in molecule-ai/operator-config (`bin/molecule-ci-fleet-queue.py`).
  # `workflow_dispatch` remains the explicit manual fallback. A deployed
  # conductor's fleet kill switch is
  # `/var/lib/molecule/disabled/molecule-ci-conductor-fleet`; no operator host
  # or `/etc/molecule-bootstrap` control path exists.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitea-merge-queue-${{ github.repository }}
  cancel-in-progress: false

jobs:
  queue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out queue script from main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Process one queued PR
        env:
          # Manual-dispatch fallback only: the repo secret supplies the
          # non-bypass merge actor. The conductor injects its token separately.
          GITEA_TOKEN: ${{ secrets.AUTO_SYNC_TOKEN }}
          GITEA_HOST: git.moleculesai.app
          REPO: ${{ github.repository }}
          WATCH_BRANCH: ${{ github.event.repository.default_branch }}
          QUEUE_LABEL: merge-queue
          HOLD_LABEL: merge-queue-hold
          UPDATE_STYLE: merge
          # Current manual-fallback context for this repository.
          REQUIRED_CONTEXTS: CI / Workflow YAML lint (pull_request)
          PUSH_REQUIRED_CONTEXTS: CI / Workflow YAML lint (push)
        run: python3 .gitea/scripts/gitea-merge-queue.py
