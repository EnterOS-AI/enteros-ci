# CANONICAL consumer ci.yml for workspace-template repos — molecule-ai/molecule-ci SSOT.
#
# This is the file NEW workspace-template repos inherit. It standardizes the
# emitted commit-status context to `CI / validate` (workflow `name: CI` + a
# job whose status display-name is `validate`), so a single canonical
# branch-protection required context — `CI / validate (pull_request)` —
# works fleet-wide. See molecule-ci .gitea/workflows/bp-context-drift-gate.yml
# and the design doc bp-drift-durable-fix.md for the drift root cause this
# resolves (a BP-required context with no emitter = perma-pending = HTTP 405
# merge-block forever).
#
# WHY INLINE (not `uses: molecule-ai/molecule-ci/.gitea/workflows/...`):
# cross-repo `uses:` (workflow_call) does NOT execute in Gitea Actions 1.26.4;
# a consumer job can be recorded as successful without running the referenced
# steps. The former remote definition was removed from active workflows. This
# template instead INLINES the validate job: it anonymously fetches the public
# molecule-ci SSOT at an immutable pin and runs the canonical
# validator script directly. Same single-source-of-truth (the validator lives
# in molecule-ci at a reviewed immutable pin), no cross-repo `uses:`.
#
# When the Gitea deployment supports cross-repo reusable workflows, this
# inline job can collapse back to a
# `uses:` call WITHOUT changing the emitted `CI / validate` context.
#
# Fork-PR security: on EXTERNAL fork PRs the validator runs in --static-only
# mode (no pip install of the template's requirements.txt, no adapter.py
# import, no docker build) — those are arbitrary-code-execution primitives
# from an untrusted PR's perspective. Internal PRs and pushes get the full
# runtime validation. The split preserves one emitted
# `CI / validate` context.
#
# The SSOT is fetched under job-isolated RUNNER_TEMP so a consumer's tracked
# `.molecule-ci/` compatibility surface is never overwritten or scanned.

name: CI

on:
  pull_request:
  push:
    branches: [main, staging]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MOLECULE_CI_REF: 9a2fd33e4ece9e54a3e1364c74daa59336ed151b
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
      # Fetch the canonical validator from the public molecule-ci SSOT. A
      # direct anonymous SHA fetch avoids cross-repo workflow/action resolution on
      # Gitea 1.26.4 while still executing one canonical script implementation.
      - name: Fetch immutable molecule-ci canonical scripts
        run: |
          test -n "${RUNNER_TEMP:-}"
          CI_ROOT="$RUNNER_TEMP/molecule-ci-ssot"
          mkdir "$CI_ROOT"
          git init -q "$CI_ROOT"
          git -C "$CI_ROOT" remote add origin \
            https://git.moleculesai.app/molecule-ai/molecule-ci.git
          git -C "$CI_ROOT" fetch -q --depth 1 origin "$MOLECULE_CI_REF"
          git -C "$CI_ROOT" checkout -q --detach FETCH_HEAD
          test "$(git -C "$CI_ROOT" rev-parse HEAD)" = "$MOLECULE_CI_REF"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - run: pip install --break-system-packages pyyaml jsonschema packaging -q
      # Secret scan — always runs, including on external fork PRs (static,
      # no code execution; the most important security check).
      - name: Check for secrets
        run: python3 "$RUNNER_TEMP/molecule-ci-ssot/scripts/check-secrets.py"
      # Official-template SSOT enforcement is OPT-IN via a committed `.official`
      # marker (dynamic — no hardcoded repo allowlist). When present the
      # validator runs with --official so check_no_hardcoded_provider_model ERRORs
      # on a re-pinned default provider/model or a pinned platform LLM proxy
      # base_url. A `.official` containing `allow-self-model` also passes
      # --allow-self-model (platform-agent's top-level `model:`, core#2594).
      # NON-official templates (no marker) are unaffected — the gate never fires.
      - name: Detect official-template SSOT enforcement
        id: official
        run: |
          FLAGS=""
          if [ -f .official ]; then
            FLAGS="--official"
            if grep -qi 'allow-self-model' .official 2>/dev/null; then
              FLAGS="$FLAGS --allow-self-model"
            fi
            # allow-platform-route: exempt the platform-agent (Org Concierge)
            # CP-proxy ROUTE — runtime_config.provider: platform + a platform-named
            # provider entry's Molecule proxy base_url (Rule #13). Model re-pins
            # are STILL gated.
            if grep -qi 'allow-platform-route' .official 2>/dev/null; then
              FLAGS="$FLAGS --allow-platform-route"
            fi
            echo "::notice::Official template (.official marker) — enforcing SSOT-inheritance lint: $FLAGS"
          fi
          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
      # Always validate requirement provenance before any package installation.
      # External fork PRs stop after this static-only boundary.
      - name: Validate workspace-template contract (static)
        run: python3 "$RUNNER_TEMP/molecule-ci-ssot/scripts/validate-workspace-template.py" --static-only ${{ steps.official.outputs.flags }}
      # Internal PRs and pushes: FULL runtime validation. Install the
      # template's own runtime deps so the validator can import adapter.py
      # the same way the workspace container does at boot.
      - name: Install source-pinned runtime and template dependencies
        if: github.event.pull_request.head.repo.fork != true
        run: python3 "$RUNNER_TEMP/molecule-ci-ssot/scripts/install_workspace_dependencies.py" --allow-missing --break-system-packages
      - name: Validate workspace-template contract (full)
        if: github.event.pull_request.head.repo.fork != true
        run: python3 "$RUNNER_TEMP/molecule-ci-ssot/scripts/validate-workspace-template.py" ${{ steps.official.outputs.flags }}
