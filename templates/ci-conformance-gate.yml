# CANONICAL consumer caller for the reusable conformance gate —
# molecule-ai/molecule-ci SSOT. Copy this into a CONSUMER repo as
# .gitea/workflows/conformance-gate.yml and fill in the inputs.
#
# WHAT IT IS: P1 of RFC #3285 — one shared boundary-gate any consumer adopts,
# replacing the per-repo bespoke scripts (mcp-server provenance-gate.sh +
# core check-published-mcp-manifest.mjs). The gate is FAIL-CLOSED and evaluated
# mode/version-specifically.
#
# WHY INLINE-CLONE (not `uses: molecule-ai/molecule-ci/.gitea/actions/...@v1`):
# Cross-repo local-action resolution is not a validated capability of the
# current Gitea CI contract. We therefore anonymously fetch the PUBLIC molecule-ci
# SSOT at an immutable reviewed commit and reference the composite action by
# LOCAL path. Same single-source-of-truth (the action lives in molecule-ci),
# with no mutable dependency or unverified remote `uses:` behavior.
# When the Gitea deployment supports cross-repo local actions, this
# guarded local-fetch step can be dropped in favour of a direct
# `uses: molecule-ai/molecule-ci/.gitea/actions/conformance-gate@v1` WITHOUT
# changing the emitted `conformance-gate / conformance` context name.
#
# ROLLOUT (soak-then-promote — the fleet pattern): ship this as a STANDALONE
# workflow, NOT a ci.yml job, NOT in branch protection. Let the emitted context
# `conformance-gate / conformance (pull_request)` soak GREEN, then promote it
# into branch-protection status_check_contexts (owner-only BP edit) AFTER any
# pre-gate cleanup lands. BP-drift trap: a BP-required context with no emitter =
# perma-pending = permanent merge-block — only promote a name actually emitted.

name: conformance-gate

on:
  pull_request:
    # Path-filter to what affects the gate decision. Tune per consumer.
    paths:
      - "contracts/**"
      - ".gitea/workflows/conformance-gate.yml"
  push:
    branches: [main, staging]
  schedule:
    # The stale-published-build failure mode is TIME-dependent, not
    # commit-dependent — a daily run catches a producer publishing out of band.
    - cron: "41 4 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Pinned version or dist-tag to evaluate"
        required: false
        default: "latest"

permissions:
  contents: read

jobs:
  conformance:
    name: conformance
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      MOLECULE_CI_REF: ce4f84f1c9851c3ee6a49a8d9862934dd9965c44
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      # Keep the gate independent of unverified cross-repo local-action
      # resolution: fetch the SSOT, then reference it by guarded LOCAL path.
      - name: Fetch immutable molecule-ci SSOT into guarded local-action path
        run: |
          test ! -e .molecule-ci-ssot
          git init -q .molecule-ci-ssot
          git -C .molecule-ci-ssot remote add origin \
            https://git.moleculesai.app/molecule-ai/molecule-ci.git
          git -C .molecule-ci-ssot fetch -q --depth 1 origin "$MOLECULE_CI_REF"
          git -C .molecule-ci-ssot checkout -q --detach FETCH_HEAD
          test "$(git -C .molecule-ci-ssot rev-parse HEAD)" = "$MOLECULE_CI_REF"

      # ── EXAMPLE A: package-introspection (consumer side — e.g. molecule-core)
      # Asserts the PUBLISHED build's management manifest ⊇ the contract verbs.
      - name: Conformance gate (published manifest ⊇ contract)
        uses: ./.molecule-ci-ssot/.gitea/actions/conformance-gate
        with:
          mode: package-introspection
          package: "@molecule-ai/mcp-server"
          version: ${{ github.event.inputs.version || 'latest' }}
          contract-path: contracts/mcp-plugin-delivery.contract.json
          server-mode: management
          # expected-server-name defaults to contract.mcp_server_name.
          require-token: "true"
          # Trusted for push/schedule/dispatch and same-repo PRs; fork PRs (which
          # can't hold secrets) classify as untrusted and soft-skip.
          is-trusted: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          registry-token: ${{ secrets.MCP_SERVER_READPKG_TOKEN }}

      # ── EXAMPLE B: registry-provenance (producer side — e.g. mcp-server)
      # Asserts every published version has a matching v<version> git tag.
      # Uncomment in the producer repo (and drop Example A there):
      #
      # - name: Conformance gate (publish provenance)
      #   uses: ./.molecule-ci-ssot/.gitea/actions/conformance-gate
      #   with:
      #     mode: registry-provenance
      #     package: "@molecule-ai/mcp-server"
      #     allowlist: "1.6.0 1.6.1"   # FROZEN pre-gate set
      #     registry-token: ${{ secrets.MCP_SERVER_READPKG_TOKEN }}
